basePath: /
definitions:
  model.AIChatMessage:
    properties:
      content:
        type: string
      role:
        type: string
    type: object
  model.AIChatRequest:
    properties:
      categories:
        description: 可选，筛选指定分类的日志
        items:
          type: string
        type: array
      end_date:
        type: string
      history:
        items:
          $ref: '#/definitions/model.AIChatMessage'
        type: array
      message:
        type: string
      provider_name:
        type: string
      start_date:
        type: string
      system_prompt:
        type: string
    required:
    - end_date
    - message
    - start_date
    type: object
  model.AIProvider:
    properties:
      api_key:
        type: string
      default:
        type: boolean
      endpoint:
        type: string
      model:
        type: string
      name:
        type: string
    type: object
  model.Category:
    properties:
      color:
        type: string
      name:
        type: string
      rules:
        items:
          $ref: '#/definitions/model.CategoryRule'
        type: array
    type: object
  model.CategoryRule:
    properties:
      pattern:
        type: string
      type:
        description: '"fixed" 或 "regex"'
        type: string
    type: object
  model.CategorySummary:
    properties:
      category:
        type: string
      display:
        type: string
      duration:
        description: 总秒数
        type: integer
      percentage:
        description: 占比
        type: number
    type: object
  model.CrossDayHint:
    properties:
      category:
        type: string
      direction:
        description: '"prev" = 卡片在前一天, "next" = 卡片在后一天'
        type: string
      end_time:
        description: 在本天的结束时间
        type: string
      event_type:
        type: string
      start_time:
        description: 在本天的起始时间
        type: string
    type: object
  model.DailyStatistics:
    properties:
      cross_day_hints:
        items:
          $ref: '#/definitions/model.CrossDayHint'
        type: array
      date:
        type: string
      items:
        items:
          $ref: '#/definitions/model.DurationItem'
        type: array
      summary:
        items:
          $ref: '#/definitions/model.CategorySummary'
        type: array
      time_point_mode:
        type: string
      total_known:
        description: 已知时长总秒数
        type: integer
    type: object
  model.DayBreakdown:
    properties:
      date:
        type: string
      summary:
        items:
          $ref: '#/definitions/model.CategorySummary'
        type: array
      total_known:
        type: integer
    type: object
  model.DurationItem:
    properties:
      category:
        type: string
      cross_day:
        description: 跨天任务
        type: boolean
      display:
        description: 可读格式 "1h30m"
        type: string
      duration:
        description: 秒
        type: integer
      end_time:
        description: HH:mm
        type: string
      event_type:
        type: string
      start_time:
        description: HH:mm
        type: string
      time_point_mode:
        description: 该条目创建时的模式
        type: string
      unknown:
        description: 首条/末条未知时长
        type: boolean
    type: object
  model.FetchModelsRequest:
    properties:
      api_key:
        type: string
      endpoint:
        type: string
      name:
        type: string
    required:
    - endpoint
    type: object
  model.LogEntryRequest:
    properties:
      detail:
        type: string
      event_type:
        type: string
      log_date:
        description: 可选，默认今天
        type: string
      log_time:
        description: 必填，支持多种格式
        type: string
    required:
    - event_type
    - log_time
    type: object
  model.LogEntryResponse:
    properties:
      category:
        type: string
      detail:
        type: string
      event_type:
        type: string
      id:
        type: integer
      log_date:
        type: string
      log_time:
        type: string
      time_point_mode:
        type: string
    type: object
  model.LoginRequest:
    properties:
      password:
        type: string
    required:
    - password
    type: object
  model.LoginResponse:
    properties:
      token:
        type: string
    type: object
  model.PageResult:
    properties:
      items: {}
      page:
        type: integer
      size:
        type: integer
      total:
        type: integer
    type: object
  model.PasswordRequest:
    properties:
      new_password:
        minLength: 4
        type: string
      old_password:
        type: string
    required:
    - new_password
    type: object
  model.PeriodStatistics:
    properties:
      day_count:
        type: integer
      end_date:
        type: string
      items:
        items:
          $ref: '#/definitions/model.DurationItem'
        type: array
      start_date:
        type: string
      summary:
        items:
          $ref: '#/definitions/model.CategorySummary'
        type: array
      total_known:
        type: integer
    type: object
  model.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  model.TrendStatistics:
    properties:
      days:
        items:
          $ref: '#/definitions/model.DayBreakdown'
        type: array
      end_date:
        type: string
      start_date:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: 无压力每日事项记录系统
  title: Lifelog API
  version: "1.0"
paths:
  /api/ai/chat:
    post:
      consumes:
      - application/json
      parameters:
      - description: 对话请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.AIChatRequest'
      produces:
      - text/event-stream
      responses:
        "200":
          description: SSE 流式响应
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
      summary: AI 流式对话（SSE）
      tags:
      - AI
  /api/ai/models:
    post:
      consumes:
      - application/json
      parameters:
      - description: 提供商接口信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.FetchModelsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  items:
                    type: string
                  type: array
              type: object
      summary: 获取AI提供商的可用模型列表
      tags:
      - AI
  /api/ai/providers:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.AIProvider'
                  type: array
              type: object
      summary: 获取AI服务提供商列表
      tags:
      - AI
    post:
      consumes:
      - application/json
      parameters:
      - description: 提供商信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.AIProvider'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
      summary: 添加AI服务提供商
      tags:
      - AI
  /api/ai/providers/{name}:
    delete:
      parameters:
      - description: 提供商名称
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.Response'
      summary: 删除AI服务提供商
      tags:
      - AI
    put:
      consumes:
      - application/json
      parameters:
      - description: 提供商名称
        in: path
        name: name
        required: true
        type: string
      - description: 提供商信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.AIProvider'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.Response'
      summary: 更新AI服务提供商
      tags:
      - AI
  /api/ai/providers/test:
    post:
      consumes:
      - application/json
      parameters:
      - description: 提供商信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.AIProvider'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
      summary: 测试AI服务提供商连接
      tags:
      - AI
  /api/auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: 登录信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.LoginResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/model.Response'
      summary: 密码登录
      tags:
      - 认证
  /api/auth/password:
    put:
      consumes:
      - application/json
      parameters:
      - description: 密码信息
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.PasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
      summary: 设置或修改密码
      tags:
      - 认证
  /api/categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.Category'
                  type: array
              type: object
      summary: 获取所有大类及其匹配规则
      tags:
      - 大类
    put:
      consumes:
      - application/json
      parameters:
      - description: 分类列表
        in: body
        name: categories
        required: true
        schema:
          items:
            $ref: '#/definitions/model.Category'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
      summary: 更新分类规则
      tags:
      - 大类
  /api/check-update:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
      summary: 检查是否有新版本
  /api/data/export:
    get:
      produces:
      - application/zip
      responses:
        "200":
          description: OK
          schema:
            type: file
      summary: 导出数据
      tags:
      - 数据管理
  /api/data/import:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: 导出的 zip 文件
        in: formData
        name: file
        required: true
        type: file
      - description: 是否合并日志（true=合并，false=替换）
        in: formData
        name: merge_logs
        type: boolean
      - description: 是否导入配置
        in: formData
        name: import_config
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
      summary: 导入数据
      tags:
      - 数据管理
  /api/logs:
    get:
      parameters:
      - description: 日期 YYYY-MM-DD
        in: query
        name: date
        type: string
      - description: 事项类型
        in: query
        name: event_type
        type: string
      - description: 大类名称
        in: query
        name: category
        type: string
      - description: 关键词
        in: query
        name: keyword
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页数量
        in: query
        name: size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.PageResult'
              type: object
      summary: 查询日志列表
      tags:
      - 日志
    post:
      consumes:
      - application/json
      parameters:
      - description: 日志内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.LogEntryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.LogEntryResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
      summary: 新增日志条目
      tags:
      - 日志
  /api/logs/{id}:
    delete:
      parameters:
      - description: 日志ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
      summary: 删除日志条目
      tags:
      - 日志
    get:
      parameters:
      - description: 日志ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.LogEntryResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.Response'
      summary: 获取单条日志
      tags:
      - 日志
    put:
      consumes:
      - application/json
      parameters:
      - description: 日志ID
        in: path
        name: id
        required: true
        type: integer
      - description: 日志内容
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/model.LogEntryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.LogEntryResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.Response'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/model.Response'
      summary: 修改日志条目
      tags:
      - 日志
  /api/logs/event-types:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  items:
                    type: string
                  type: array
              type: object
      summary: 获取所有事项类型
      tags:
      - 日志
  /api/logs/timeline:
    get:
      parameters:
      - description: 日期 YYYY-MM-DD
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/model.LogEntryResponse'
                  type: array
              type: object
      summary: 获取某天时间轴
      tags:
      - 日志
  /api/settings:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
      summary: 获取系统配置
      tags:
      - 设置
    put:
      consumes:
      - application/json
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
      summary: 更新系统配置
      tags:
      - 设置
  /api/statistics/daily:
    get:
      parameters:
      - description: 日期 YYYY-MM-DD
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.DailyStatistics'
              type: object
      summary: 获取某天的统计数据
      tags:
      - 统计
  /api/statistics/monthly:
    get:
      parameters:
      - description: 年份
        in: query
        name: year
        required: true
        type: integer
      - description: 月份
        in: query
        name: month
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.PeriodStatistics'
              type: object
      summary: 获取某月的统计数据
      tags:
      - 统计
  /api/statistics/trend:
    get:
      parameters:
      - description: 开始日期 YYYY-MM-DD
        in: query
        name: start_date
        required: true
        type: string
      - description: 结束日期 YYYY-MM-DD
        in: query
        name: end_date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.TrendStatistics'
              type: object
      summary: 获取日期范围内每天的分类汇总
      tags:
      - 统计
  /api/statistics/weekly:
    get:
      parameters:
      - description: 日期 YYYY-MM-DD
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/model.Response'
            - properties:
                data:
                  $ref: '#/definitions/model.PeriodStatistics'
              type: object
      summary: 获取某天所在周的统计数据
      tags:
      - 统计
  /api/version:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Response'
      summary: 获取版本信息
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
