services:
  lifelog:
    image: hxuanyu521/lifelog:latest
    container_name: lifelog
    restart: unless-stopped
    ports:
      - "8080:8080"
      # - "8081:8081"  # MCP 端口，按需开启
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - TZ=Asia/Shanghai
      # 环境变量覆盖配置示例（前缀 LIFELOG_，层级用 _ 分隔）：
      # - LIFELOG_SERVER_PORT=8080
      # - LIFELOG_SERVER_DB_PATH=./data/lifelog.db
      # - LIFELOG_AUTH_JWT_SECRET=change-me-to-a-random-string
      # - LIFELOG_AUTH_JWT_EXPIRE_HOURS=168
      # - LIFELOG_MCP_ENABLED=true
      # - LIFELOG_MCP_PORT=8081
